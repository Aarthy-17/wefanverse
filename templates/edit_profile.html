{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">

            <h4 class="card-title mb-4 text-center">Edit Profile</h4>

            <!-- enctype is required for file upload -->
            <form method="POST" enctype="multipart/form-data">
                
                <!-- Username (optional) -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username"
                           class="form-control" value="{{ user.username }}">
                </div>

                <!-- Email (optional) -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email"
                           class="form-control" value="{{ user.email }}">
                </div>

                <!-- Bio -->
                <div class="mb-3">
                    <label for="bio" class="form-label">Bio</label>
                    <textarea name="bio" id="bio" class="form-control" rows="3">{{ user.bio }}</textarea>
                </div>

                <!-- Profile Picture Upload -->
                <div class="mb-3">
                    <label for="profile_pic" class="form-label">Profile Picture</label>
                    <input type="file" name="profile_pic" id="profile_pic" class="form-control">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('user_routes.profile_page', user_id=user.id) }}"
                       class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
