{% extends "base.html" %}

{% block content %}
<div class="settings-container">
    <a href="{{ url_for('artist_auth.account_center') }}" class="back-btn">← Back</a>
    <h1 class="page-title">Personal Details</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash-message {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
   <form method="POST" action="{{ url_for('artist_auth.personal_details') }}">
        <label>Name:</label>
        <input type="text" name="name" value="{{ artist.name }}" required>

        <label>Email:</label>
        <input type="email" name="email" value="{{ artist.email }}" required>

        <button type="submit">Update</button>
    </form>
</div>

<style>
.settings-container { max-width: 600px; }
.back-btn { display:inline-block; margin-bottom:20px; color:#bb33ff; text-decoration:none; }
form label { display:block; margin:10px 0 4px; }
form input { width:100%; padding:8px; margin-bottom:12px; border-radius:6px; border:1px solid #bbb; }
form button { padding:10px 18px; border:none; border-radius:6px; background:#bb33ff; color:white; cursor:pointer; }
form button:hover { background:#a22aff; }
</style>
{% endblock %}
