{% extends 'base.html' %}
{% block content %}

<h3 class="mb-3 text-warning">Live Videos 🎥</h3>

<div class="row">
    {% for video in videos %}
    <div class="col-md-6 mb-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold">{{ video.title }}</h6>
                <iframe width="100%" height="315"
                        src="{{ video.url }}"
                        frameborder="0"
                        allowfullscreen>
                </iframe>
                <p class="mt-2">{{ video.description }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
