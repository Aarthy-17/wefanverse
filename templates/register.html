
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | WeFanVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --orange:#ff8c00;
  --purple-glass:rgba(138,43,226,0.22);
}

body{
  margin:0;
  font-family:Poppins,system-ui;
  color:#fff;
  background:#050007;
  overflow-x:hidden;
}

/* ===== PARALLAX SCENE ===== */
.scene{
  position:fixed;
  inset:0;
  perspective:900px;
  z-index:-3;
}
.layer{
  position:absolute;
  inset:-15%;
  transition:transform .1s linear;
}
.layer.bg{
  background:
    radial-gradient(circle at top left, rgba(138,43,226,.45), transparent 40%),
    linear-gradient(120deg,#120015,#000);
}
.layer.mid{
  background:
    radial-gradient(circle at bottom right, rgba(186,85,255,.35), transparent 45%);
}
.layer.glow{
  background:
    radial-gradient(circle at center, rgba(255,140,0,.15), transparent 60%);
}

/* ===== PARTICLES ===== */
.particles{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
}
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:rgba(186,85,255,.8);
  border-radius:50%;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(110vh);opacity:0}
  10%{opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}

/* ===== MUSIC RIPPLES ===== */
.ripples{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}
.ripple{
  position:absolute;
  border:1px solid rgba(186,85,255,.35);
  border-radius:50%;
  animation:ripple 6s infinite;
}
@keyframes ripple{
  from{transform:scale(.2);opacity:.6}
  to{transform:scale(2.5);opacity:0}
}

/* ===== NAVBAR ===== */
.navbar{
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,140,0,.3);
}
.navbar-brand{
  color:var(--orange)!important;
  font-weight:900;
}
.nav-link{
  color:#fff!important;
}
.nav-link:hover{
  color:var(--orange)!important;
  text-shadow:0 0 8px var(--orange);
}

/* ===== REGISTER SECTION ===== */
.register-wrapper{
  min-height:100vh;
  padding-top:90px;
  display:flex;
  align-items:center;
}
.register-image{
  background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
    url("/static/images/ab3.jpeg") center/cover no-repeat;
  border-radius:22px 0 0 22px;
  min-height:520px;
}
.glass-box{
  background:var(--purple-glass);
  backdrop-filter:blur(24px);
  border-radius:0 22px 22px 0;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 0 45px rgba(138,43,226,.6);
}

.form-control{
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
}
.form-control:focus{
  border-color:var(--orange);
  box-shadow:0 0 10px rgba(255,140,0,.8);
}

.btn-accent{
  background:linear-gradient(135deg,#ff8c00,#ffb347);
  color:#000;
  font-weight:700;
}

/* MOBILE */
@media(max-width:768px){
  .register-image{display:none}
  .glass-box{border-radius:22px}
}
</style>
</head>

<body>

<!-- PARALLAX -->
<div class="scene">
  <div class="layer bg"></div>
  <div class="layer mid"></div>
  <div class="layer glow"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- RIPPLES -->
<div class="ripples">
  <div class="ripple" style="width:220px;height:220px;top:35%;left:45%"></div>
  <div class="ripple" style="width:320px;height:320px;top:55%;left:60%;animation-delay:2s"></div>
  <div class="ripple" style="width:180px;height:180px;top:45%;left:30%;animation-delay:4s"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand" href="/">WeFanVerse</a>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="/about">About</a></li>
<li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
<li class="nav-item ms-2"><a class="btn btn-sm btn-accent" href="/login">Login</a></li>
</ul>
</div>
</nav>

<!-- REGISTER -->
<div class="container register-wrapper">
<div class="row shadow-lg w-100" style="max-width:950px;margin:auto">

<div class="col-md-6 register-image"></div>

<div class="col-md-6 glass-box p-5">
<h3 class="fw-bold text-warning">Create Account ✨</h3>
<p class="opacity-75 mb-4">Join the purple K-pop universe</p>

<!-- ✅ WORKING FORM -->
<form method="POST" action="/register">

  <input class="form-control mb-3"
         type="text"
         name="username"
         placeholder="Username"
         required>

  <input class="form-control mb-3"
         type="email"
         name="email"
         placeholder="Email"
         required>

  <input class="form-control mb-3"
         type="password"
         name="password"
         placeholder="Password"
         required>

  <input class="form-control mb-3"
         type="password"
         name="confirm_password"
         placeholder="Confirm Password"
         required>

  <button type="submit" class="btn btn-accent w-100 mt-2">
    Sign Up
  </button>
</form>

<p class="text-center mt-4">
Already have an account?
<a href="/login" class="text-warning fw-bold">Login</a>
</p>
</div>

</div>
</div>
<hr class="my-4 opacity-25">

<div class="text-center small">
  <p class="mb-1">Are you an Artist? 🎶</p>
  <a href="/artist/register" class="text-warning fw-bold me-2">
    Artist Register
  </a>
  |
  <a href="/artist/login" class="text-warning fw-bold ms-2">
    Artist Login
  </a>
</div>


<!-- FOOTER -->
<footer class="text-center py-4">
<p>© 2025 <span class="text-warning fw-bold">WeFanVerse</span></p>
<div>
<i class="bi bi-instagram me-3"></i>
<i class="bi bi-twitter me-3"></i>
<i class="bi bi-youtube me-3"></i>
<i class="bi bi-discord"></i>
</div>
</footer>

<!-- JS EFFECTS -->
<script>
/* PARTICLES */
const particles=document.getElementById("particles");
for(let i=0;i<60;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=8+Math.random()*8+"s";
  p.style.opacity=Math.random();
  particles.appendChild(p);
}

/* MOUSE PARALLAX */
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-.5)*30;
  const y=(e.clientY/window.innerHeight-.5)*30;
  document.querySelector(".layer.bg").style.transform=`translate(${x/4}px,${y/4}px)`;
  document.querySelector(".layer.mid").style.transform=`translate(${x/2}px,${y/2}px)`;
  document.querySelector(".layer.glow").style.transform=`translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
