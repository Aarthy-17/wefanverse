{% extends 'base.html' %}

{% block title %}Password Security | WeFanVerse{% endblock %}

{% block content %}
<div class="row">
    <!-- Settings Sidebar -->
    <div class="col-md-3">
        {% include 'settings_sidebar.html' %}
    </div>

    <!-- Main Content -->
    <div class="col-md-9">
        <h2 class="text-purple mb-4">Password Security</h2>

        {% if message %}
        <div class="alert alert-purple">
            {{ message }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label for="current_password" class="form-label">Current Password</label>
                <input type="password" class="form-control" id="current_password" name="current_password" required>
            </div>

            <div class="mb-3">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>

            <!-- Buttons -->
            <div class="mt-4">
                <button type="submit" class="btn btn-purple me-2">Update Password</button>
                <a href="{{ url_for('user_routes.account_center') }}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>

<style>
.btn-purple {
    background-color: var(--purple);
    color: #fff;
}

.btn-purple:hover {
    background-color: #aa29e5;
    color: #fff;
}

.btn-secondary {
    background-color: #555;
    color: #fff;
}

.btn-secondary:hover {
    background-color: #444;
    color: #fff;
}

.alert-purple {
    background-color: rgba(187, 51, 255, 0.2);
    border-left: 4px solid var(--purple);
    color: var(--purple);
    padding: 12px 15px;
    border-radius: 5px;
    margin-bottom: 20px;
}
</style>
{% endblock %}
