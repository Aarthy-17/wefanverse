<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        body {
            background: #0b0b0b;
            color: white;
        }

        .sidebar {
            width: 240px;
            background: #111;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .sidebar a {
            color: #bbb;
            display: block;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .sidebar a:hover {
            background: #1f1f1f;
            color: white;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h5 class="mb-4">WeFanVerse</h5>

    <a href="{{ url_for('user_routes.dashboard') }}">
        <i class="fas fa-chart-line me-2"></i> Dashboard
    </a>

    <a href="{{ url_for('user_routes.edit_profile', user_id=session['user_id']) }}">
        <i class="fas fa-user me-2"></i> Edit Profile
    </a>

    <a href="{{ url_for('auth.logout') }}" class="text-danger">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
