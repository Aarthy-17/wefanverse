{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4" style="font-family: 'Roboto', sans-serif; color: #9b59b6;">
        🔐 Security Settings
    </h3>

    <div class="list-group" style="font-family: 'Montserrat', sans-serif;">

        <a class="list-group-item list-group-item-action custom-purple">
            Change Password
        </a>

        <a class="list-group-item list-group-item-action custom-purple">
            Two-Factor Authentication
        </a>

        <a class="list-group-item list-group-item-action custom-purple">
            Login Activity
        </a>

    </div>
</div>

<style>
    .custom-purple {
        background: linear-gradient(90deg, #6a0dad, #9b59b6);
        color: #fff !important;
        border-radius: 10px;
        margin-bottom: 12px;
        border: 1px solid rgba(155, 89, 182, 0.4);
        transition: all 0.3s ease;
        font-weight: 500;
        padding: 12px 20px;
    }
    .custom-purple:hover {
        background: linear-gradient(90deg, #9b59b6, #8e44ad);
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        color: #fff;
    }
    h3 {
        text-shadow: 1px 1px 4px rgba(155, 89, 182, 0.5);
    }
</style>
{% endblock %}
