<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artist Login | WeFanVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --orange:#ff8c00;
  --purple-glass:rgba(138,43,226,0.22);
}

body{
  margin:0;
  font-family:Poppins,system-ui;
  color:#fff;
  overflow-x:hidden;
  background:#050007;
}

/* ===== PARALLAX ===== */
.scene{
  position:fixed;
  inset:0;
  perspective:800px;
  z-index:-3;
}
.layer{
  position:absolute;
  inset:-15%;
  transition:transform .1s linear;
}
.layer.bg{
  background:
    radial-gradient(circle at top left, rgba(138,43,226,.45), transparent 40%),
    linear-gradient(120deg,#120015,#000);
}
.layer.mid{
  background:
    radial-gradient(circle at bottom right, rgba(186,85,255,.35), transparent 45%);
}
.layer.glow{
  background:
    radial-gradient(circle at center, rgba(255,140,0,.15), transparent 60%);
}

/* ===== PARTICLES ===== */
.particles{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
}
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:rgba(186,85,255,.8);
  border-radius:50%;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(110vh); opacity:0}
  10%{opacity:1}
  to{transform:translateY(-10vh); opacity:0}
}

/* ===== RIPPLES ===== */
.ripples{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}
.ripple{
  position:absolute;
  border:1px solid rgba(186,85,255,.35);
  border-radius:50%;
  animation:ripple 6s infinite;
}
@keyframes ripple{
  from{transform:scale(.2); opacity:.6}
  to{transform:scale(2.5); opacity:0}
}

/* ===== NAVBAR ===== */
.navbar{
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,140,0,.3);
}
.navbar-brand{
  color:var(--orange)!important;
  font-weight:900;
}
.nav-link{
  color:#fff!important;
}
.nav-link:hover{
  color:var(--orange)!important;
}

/* ===== LOGIN ===== */
.login-wrapper{
  min-height:100vh;
  padding-top:90px;
  display:flex;
  align-items:center;
}
.login-image{
  background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
    url("/static/images/aarthy.jpg") center/cover no-repeat;
  border-radius:22px 0 0 22px;
  min-height:480px;
}
.glass-box{
  background:var(--purple-glass);
  backdrop-filter:blur(24px);
  border-radius:0 22px 22px 0;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 0 45px rgba(138,43,226,.6);
}
.form-control{
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
}
.form-control:focus{
  border-color:var(--orange);
  box-shadow:0 0 10px rgba(255,140,0,.8);
}
.btn-accent{
  background:linear-gradient(135deg,#ff8c00,#ffb347);
  color:#000;
  font-weight:700;
}

/* MOBILE */
@media(max-width:768px){
  .login-image{display:none}
  .glass-box{border-radius:22px}
}
</style>
</head>

<body>

<!-- PARALLAX -->
<div class="scene">
  <div class="layer bg"></div>
  <div class="layer mid"></div>
  <div class="layer glow"></div>
</div>

<div class="particles" id="particles"></div>

<div class="ripples">
  <div class="ripple" style="width:200px;height:200px;top:30%;left:40%"></div>
  <div class="ripple" style="width:300px;height:300px;top:55%;left:55%;animation-delay:2s"></div>
  <div class="ripple" style="width:150px;height:150px;top:45%;left:30%;animation-delay:4s"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand" href="/">WeFanVerse</a>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="/about">About</a></li>
<li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
<li class="nav-item ms-2"><a class="btn btn-sm btn-accent" href="/artist/register">Artist Register</a></li>
</ul>
</div>
</nav>

<!-- ARTIST LOGIN -->
<div class="container login-wrapper">
<div class="row shadow-lg w-100" style="max-width:900px;margin:auto">

<div class="col-md-6 login-image"></div>

<div class="col-md-6 glass-box p-5">
<h3 class="fw-bold text-warning">Artist Login 🎤</h3>
<p class="opacity-75 mb-4">Step onto your WeFanVerse stage</p>

<form method="POST" action="/artist/login">

  <input class="form-control mb-3"
         type="email"
         name="email"
         placeholder="Artist Email"
         required>

  <input class="form-control mb-3"
         type="password"
         name="password"
         placeholder="Password"
         required>

  <button type="submit" class="btn btn-accent w-100">
    Login as Artist
  </button>
</form>

<p class="text-center mt-4">
New Artist?
<a href="/artist/register" class="text-warning fw-bold">
Register Here
</a>
<a href="{{ url_for('user_routes.forgot_password') }}">
    Forgot Password?
</a>

</p>
</div>

</div>
</div>

<hr class="my-4 opacity-25">

<div class="text-center small">
  <p class="mb-1">Not an Artist?</p>
  <a href="/login" class="text-warning fw-bold">
    User Login
  </a>
</div>
<center>
<p class="mb-0">Are you admin? 
    <a href="/admin/login" class="text-danger fw-bold">Admin Login</a>
  </p></center>
</div>
<footer class="text-center py-4">
<p>© 2025 <span class="text-warning fw-bold">WeFanVerse</span></p>
</footer>

<script>
const particles=document.getElementById("particles");
for(let i=0;i<60;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=8+Math.random()*8+"s";
  p.style.opacity=Math.random();
  particles.appendChild(p);
}
</script>

</body>
</html>
