{% extends "base.html" %}

{% block content %}
<div class="settings-container">

    <a href="{{ url_for('artist_auth.account_center') }}" class="back-btn">← Back</a>

    <h1 class="page-title">Two-Factor Authentication</h1>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('artist_auth.two_factor_auth') }}">

        <label class="toggle">
            <input type="checkbox" name="enable_2fa"
                   {% if artist.two_factor_enabled %}checked{% endif %}>
            Enable Two-Factor Authentication
        </label>

        <button type="submit">Save</button>

    </form>

</div>

<style>
.settings-container {
    max-width: 600px;
}

.toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    font-size: 16px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: #bb33ff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #a22aff;
}

.flash-message {
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
}

.flash-message.success {
    background: #d4edda;
    color: #155724;
}

.flash-message.danger {
    background: #f8d7da;
    color: #721c24;
}
</style>

{% endblock %}
