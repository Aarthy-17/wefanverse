{% extends 'base.html' %}
{% block content %}

<h3 class="mb-3">Community Feed</h3>

<div class="card mb-4">
    <div class="card-body">
        <form method="POST">
            <textarea name="content" class="form-control mb-2" placeholder="Share something with fans..." required></textarea>
            <button class="btn btn-primary">Post</button>
        </form>
    </div>
</div>

{% for post in posts %}
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h6 class="fw-bold">{{ post[4] }}</h6>
        <p>{{ post[1] }}</p>

        {% if post[2] == 'Positive' %}
            <span class="badge bg-success">Positive</span>
        {% elif post[2] == 'Negative' %}
            <span class="badge bg-danger">Negative</span>
        {% else %}
            <span class="badge bg-secondary">Neutral</span>
        {% endif %}

        <small class="text-muted float-end">{{ post[3] }}</small>
    </div>
</div>
{% endfor %}

{% endblock %}
