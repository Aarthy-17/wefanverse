<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Artist Panel - WeFanVerse{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --purple: #bb33ff;
            --dark-bg: #14142b;
            --card-bg: #1f1f3d;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--dark-bg);
            color: var(--white);
            display: flex;
        }

        /* ARTIST SIDEBAR */
        .artist-sidebar {
            width: 240px;
            background: #0f0f24;
            padding: 30px 20px;
            min-height: 100vh;
            position: fixed;
            border-right: 1px solid rgba(187, 51, 255, 0.3);
        }

        .artist-sidebar h2 {
            text-align: center;
            color: var(--purple);
            margin-bottom: 40px;
        }

        .artist-sidebar a {
            display: block;
            color: var(--purple);
            text-decoration: none;
            margin: 12px 0;
            padding: 12px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .artist-sidebar a:hover {
            background: rgba(187, 51, 255, 0.2);
            color: #fff;
        }

        /* MAIN */
        .artist-main {
            margin-left: 260px;
            padding: 40px;
            width: 100%;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: var(--purple);
        }

        @media (max-width: 1000px) {
            body { flex-direction: column; }

            .artist-sidebar {
                position: relative;
                width: 100%;
                display: flex;
                justify-content: space-around;
                min-height: auto;
            }

            .artist-sidebar h2 { display: none; }

            .artist-main {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="artist-sidebar">
    <h2>WeFanVerse</h2>

    <a href="{{ url_for('artist_auth.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('artist_auth.feed') }}">Feed</a>
    <a href="{{ url_for('artist_auth.artist_notifications') }}">
🔔 Notifications
</a>
     <a href="{{ url_for('artist_auth.live_artists') }}"
           class="{% if request.endpoint == 'artist_auth.live_artists' %}active-link{% endif %}">
           Live Artists
        </a>
        <!-- GO LIVE BUTTON -->
    <a href="{{ url_for('artist_auth.start_live') }}" style="
        background:#ff2e63;
        color:white;
        padding:10px 14px;
        border-radius:10px;
        font-weight:600;
        text-align:center;
        margin-top:10px;">
        🔴 Go Live
    </a>
    <a href="{{ url_for('artist_auth.settings') }}">Settings</a>
    <a href="{{ url_for('artist_auth.logout') }}">Logout</a>

</div>

<div class="artist-main">
    {% block content %}{% endblock %}
    <div class="footer">&copy; 2026 WeFanVerse. All rights reserved.</div>
</div>

</body>
</html>
