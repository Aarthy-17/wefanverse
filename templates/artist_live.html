<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live | WeFanVerse</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Poppins,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

video{
    width:90%;
    max-width:800px;
    border-radius:20px;
    box-shadow:0 0 40px #b44cff;
}

.end-btn{
    position:fixed;
    bottom:30px;
    background:#ff4c4c;
    color:white;
    padding:14px 26px;
    border-radius:30px;
    border:none;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<form method="POST" action="{{ url_for('artist_auth.stop_live') }}">
    <button class="end-btn">End Live</button>
</form>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },  // FRONT CAMERA
    audio: true
})
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera access denied 😢");
});
</script>

</body>
</html>
