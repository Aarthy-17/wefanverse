{% extends 'base.html' %}
{% block content %}

<!-- PAGE TITLE -->
<h3 class="mb-4 text-dark fw-bold">Explore Communities</h3>

    <div class="col-md-4 col-sm-6">

            <div class="card-body">

</div>

<!-- Hover Effect -->
<style>
.hover-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 20px 50px rgba(255, 122, 24, 0.35);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
</style>

{% endblock %}
