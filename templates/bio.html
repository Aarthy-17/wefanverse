<!DOCTYPE html>
<html>
<head>
    <title>Edit Bio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card bg-black text-white p-4 mx-auto" style="max-width: 500px;">
        <h4 class="mb-3">Edit Bio</h4>

        <form method="POST">
            <textarea name="bio"
                      class="form-control mb-3"
                      rows="4"
                      placeholder="Write something about yourself...">{{ user.bio }}</textarea>

            <button type="submit" class="btn btn-success">Save</button>
            <a href="{{ url_for('user_routes.profile') }}"
               class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
